<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- pins · left -->
  <g fill="#94a3b8">
    <rect x="0" y="8"  width="4" height="2"/>
    <rect x="0" y="13" width="4" height="2"/>
    <rect x="0" y="18" width="4" height="2"/>
    <rect x="0" y="23" width="4" height="2"/>
    <!-- pins · right -->
    <rect x="28" y="8"  width="4" height="2"/>
    <rect x="28" y="13" width="4" height="2"/>
    <rect x="28" y="18" width="4" height="2"/>
    <rect x="28" y="23" width="4" height="2"/>
    <!-- pins · top -->
    <rect x="8"  y="0" width="2" height="4"/>
    <rect x="13" y="0" width="2" height="4"/>
    <rect x="18" y="0" width="2" height="4"/>
    <rect x="23" y="0" width="2" height="4"/>
    <!-- pins · bottom -->
    <rect x="8"  y="28" width="2" height="4"/>
    <rect x="13" y="28" width="2" height="4"/>
    <rect x="18" y="28" width="2" height="4"/>
    <rect x="23" y="28" width="2" height="4"/>
  </g>
  <!-- IC body (QFP) -->
  <rect x="4" y="4" width="24" height="24" rx="2" fill="#0f172a"/>
  <!-- subtle inner bevel -->
  <rect x="6" y="6" width="20" height="20" rx="1" fill="none" stroke="#334155" stroke-width="0.4"/>
  <!-- pin 1 indicator (top-left dot) — brand indigo -->
  <circle cx="8" cy="8" r="1.4" fill="#4f46e5"/>
</svg>
